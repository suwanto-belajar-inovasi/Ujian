<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWAz4Gu16tm8YYES0qI3F63viloA_qZP5QdjubbCd0mc96hfiu1MkUL-vi_7AqkXQy/exec';

async function fetchAPI(action, payload = {}) {
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: action, payload: payload })
        });
        return await response.json();
    } catch (error) {
        console.error('API Error:', error);
        return { status: 'error', message: 'Gagal terhubung ke server CBT.' };
    }
}

let globalSoalData = [];
let globalSoalHeaders = [];
let selectedLeftId = null;

function doLogin(e) {
    if(e) e.preventDefault();
    const u = document.getElementById('admUser').value.trim();
    const p = document.getElementById('admPass').value.trim();
    if(u === 'admin' && p === '123admin') {
        document.getElementById('login-overlay').style.display = 'none';
        sessionStorage.setItem('cbt_admin', 'true');
        loadPage('dashboard');
    } else { Swal.fire('Error', 'Username atau Password salah!', 'error'); }
}

function doLogout() {
    sessionStorage.removeItem('cbt_admin');
    sessionStorage.removeItem('cbt_admin_page');
    document.getElementById('formLoginAdmin').reset();
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('page-content').innerHTML = '';
}

window.onload = function() {
    if(sessionStorage.getItem('cbt_admin')) {
        document.getElementById('login-overlay').style.display = 'none';
        let lastPage = sessionStorage.getItem('cbt_admin_page') || 'dashboard';

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('show');
    overlay.classList.toggle('show');
}

function loadPage(page) {
    if (window.innerWidth <= 768) {

    }
    sessionStorage.setItem('cbt_admin_page', page);
    document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
    const navEl = document.getElementById('nav-' + page);
    if(navEl) navEl.classList.add('active');

    if (page === 'dashboard') {
        content.innerHTML = `<h3>Dashboard</h3><div class="row mt-4"><div class="col-md-3"><div class="card bg-primary text-white p-3"><h5>Peserta</h5><p>Manajemen Data Siswa</p><button class="btn btn-sm btn-light text-primary" onclick="loadPage('peserta')">Buka</button></div></div><div class="col-md-3"><div class="card bg-success text-white p-3"><h5>Ujian</h5><p>Atur Jadwal & Soal</p><button class="btn btn-sm btn-light text-success" onclick="loadPage('ujian')">Buka</button></div></div><div class="col-md-3"><div class="card bg-warning text-dark p-3"><h5>Nilai</h5><p>Lihat Hasil Ujian</p><button class="btn btn-sm btn-light" onclick="loadPage('hasil')">Buka</button></div></div><div class="col-md-3"><div class="card bg-danger text-white p-3"><h5>Cache</h5><p>Reset Data Server</p><button class="btn btn-sm btn-light text-danger" onclick="resetCache()">Reset</button></div></div></div>`;
    } else if (page === 'peserta') {

    } else if (page === 'ujian') {
        renderTablePage('Konfigurasi Ujian', 'config', ['Kode', 'Judul', 'Sheet Soal', 'Durasi', 'Mulai', 'Selesai', 'Kelas', 'Batas', 'Token Masuk', 'Akses', 'Acak', 'Hasil', 'Rules', 'UA', 'Tkn Kirim'], true, 'Config');

    } else if (page === 'soal') {

function renderTablePage(title, sheetName, headers, editable, type) {
    const content = document.getElementById('page-content');
    let btnAdd = editable ? `<button class="btn btn-success btn-sm" onclick="modal${type}('add')"><i class="fas fa-plus"></i> Tambah</button>` : '';
    content.innerHTML = `<div class="card"><div class="card-header"><span>${title}</span><div><button class="btn btn-secondary btn-sm me-2" onclick="loadPage('${type.toLowerCase()}')"><i class="fas fa-sync"></i> Refresh</button>${btnAdd}</div></div><div class="card-body table-responsive"><table class="table table-bordered table-striped table-hover small" id="table-${type}"><thead class="table-dark"><tr><th>Loading...</th></tr></thead><tbody></tbody></table></div></div>`;
    fetchTableData(sheetName, type, editable);
}

function fetchTableData(sheetName, type, editable) {
    Swal.fire({title:'Memuat Data...', text:'Mengambil data dari server', allowOutsideClick:false, didOpen:()=>Swal.showLoading()});
    fetchAPI('getAdminTable', { sheetName: sheetName }).then(res => {
        Swal.close();
        if(res.status !== 'ok') {
            document.querySelector(`#table-${type} tbody`).innerHTML = `<tr><td colspan="100" class="text-center text-danger">Error: ${res.message}</td></tr>`;
            return Swal.fire('Info', res.message, 'info');
        }

        const thead = document.querySelector(`#table-${type} thead`);
        const tbody = document.querySelector(`#table-${type} tbody`);
        let hHtml = '<tr><th>No</th>';
        res.headers.forEach(h => hHtml += `<th>${h}</th>`);
        if(editable || type === 'Hasil') hHtml += '<th>Aksi</th>'; hHtml += '</tr>';
        thead.innerHTML = hHtml;

        let bHtml = '';
        if(res.rows.length === 0) bHtml = '<tr><td colspan="100" class="text-center">Belum ada data</td></tr>';
        else {
            res.rows.forEach((row, idx) => {
                bHtml += `<tr><td>${idx+1}</td>`;
                row.forEach((cell) => {
                    let val = cell; if(String(val).length > 50) val = String(val).substring(0, 50) + '...';
                    bHtml += `<td>${val}</td>`;
                });

                if(editable) {
                    const dataStr = encodeURIComponent(JSON.stringify(row));
                    bHtml += `<td><button class="btn btn-warning btn-sm py-0" onclick="modal${type}('edit', '${dataStr}')"><i class="fas fa-edit"></i></button><button class="btn btn-danger btn-sm py-0" onclick="delete${type}('${row[0]}')"><i class="fas fa-trash"></i></button></td>`;
                } else if (type === 'Hasil') {
                    bHtml += `<td>
                    <button class="btn btn-info btn-sm py-0 text-white" onclick="koreksiHasil('${row[1]}', '${row[3]}')"><i class="fas fa-check-double"></i> Koreksi</button>
                    <button class="btn btn-danger btn-sm py-0" onclick="resetHasil('${row[1]}', '${row[3]}')"><i class="fas fa-undo"></i> Reset</button>
                    </td>`;
                }
                bHtml += '</tr>';
            });
        }
        tbody.innerHTML = bHtml;
    });
}

            document.getElementById('soalTableContainer').innerHTML = `<div class="alert alert-danger">${res.message}</div>`;
            return Swal.fire('Info', res.message, 'info');
        }

        globalSoalData = res.rows;
        globalSoalHeaders = res.headers;

        let t = `<div class="card mt-3"><div class="card-header d-flex justify-content-between align-items-center">
        <div><b>Soal: ${sheet}</b></div>
        <div>
        <button class="btn btn-info btn-sm text-white me-2" onclick="previewFullSheet()"><i class="fas fa-list-ul"></i> Preview Full</button>

        </div>
        </div><div class="card-body table-responsive"><table class="table table-bordered table-sm small table-hover"><thead class="table-dark"><tr>`;
        res.headers.forEach(h => t += `<th>${h}</th>`); t += `<th class="action-col">Aksi</th></tr></thead><tbody>`;

        res.rows.forEach((r, idx) => {
            t += `<tr>`;
            r.forEach((c,i) => {

            t += `<td class="action-col">

        });

        }
    });

    CKEDITOR.replace('editorSoal', {
        height: 200, allowedContent: true,
        toolbarGroups: [
            { name: 'clipboard', groups: [ 'clipboard', 'undo' ] },
            { name: 'editing', groups: [ 'find', 'selection', 'spellchecker' ] },

        ]

async function compressContentImages(htmlContent) {
    if (!htmlContent) return '';
    if (!htmlContent.includes('src="data:image')) return htmlContent;
    const div = document.createElement('div');
    div.innerHTML = htmlContent;
    const images = div.querySelectorAll('img[src^="data:image"]');
    if (images.length === 0) return htmlContent;
    for (let img of images) {
        try { const newSrc = await resizeBase64(img.src); img.src = newSrc; } catch (e) { console.error("Gagal kompres gambar", e); }
    }
    return div.innerHTML;
}

function resizeBase64(base64) {
    return new Promise((resolve, reject) => {
        const img = new Image(); img.src = base64;
        img.onload = () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            const MAX_WIDTH = 800; let width = img.width; let height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.onerror = reject;
    });
}

async function saveSoal() {
    const s = document.getElementById('selSheetSoal').value;
    const btnSimpan = document.querySelector('#modalSoal .btn-primary');
    const originalText = btnSimpan.innerText;
    btnSimpan.innerText = "Mengompres Gambar..."; btnSimpan.disabled = true;
    try {
        let cleanSoal = await compressContentImages(CKEDITOR.instances.editorSoal.getData());
        let cleanA = await compressContentImages(CKEDITOR.instances.s_opsA.getData());
        let cleanB = await compressContentImages(CKEDITOR.instances.s_opsB.getData());
        let cleanC = await compressContentImages(CKEDITOR.instances.s_opsC.getData());
        let cleanD = await compressContentImages(CKEDITOR.instances.s_opsD.getData());
        let cleanE = await compressContentImages(CKEDITOR.instances.s_opsE.getData());

        const d = {
            id: document.getElementById('s_id').value, tipe: document.getElementById('s_tipe').value, kd: document.getElementById('s_kd').value,
            soal: cleanSoal, opsA: cleanA, opsB: cleanB, opsC: cleanC, opsD: cleanD, opsE: cleanE, kunci: document.getElementById('s_kunci').value
        };
        if(!d.id) throw new Error('ID Soal wajib diisi');
        
        fetchAPI('saveQuestion', { sheetName: s, data: d }).then(res=>{
            btnSimpan.innerText = originalText; btnSimpan.disabled = false;
            if(res.status==='ok'){
                bootstrap.Modal.getInstance(document.getElementById('modalSoal')).hide(); viewSoalTable();
                Swal.fire('Sukses', 'Soal tersimpan', 'success');
            } else { Swal.fire('Gagal', res.message, 'error'); }
        });
    } catch (err) {
        btnSimpan.innerText = originalText; btnSimpan.disabled = false; Swal.fire('Error', err.message, 'warning');
    }
}

function parseImgTags(html) {
    if (!html) return '';
    return html.replace(/<img\s+id=([a-zA-Z0-9_-]+)>/g, (match, id) => {
        return `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w800">`;
    });
}

function generateSoalHTML(data, indexLabel) {
    let kunciIdx = globalSoalHeaders.findIndex(h => String(h).toLowerCase().includes('kunci'));
    if(kunciIdx === -1) kunciIdx = 8;
    let opsiArr = [];
    for(let i = 4; i < kunciIdx; i++) { opsiArr.push(data[i]); }
    const q = { id: data[0], tipe: data[1], kd: data[2], soal: parseImgTags(data[3]), opsi: opsiArr };
    
    let h = `<div class="soal-card-preview">
    <div style="border-bottom:2px solid #eee; margin-bottom:15px; padding-bottom:10px; font-weight:bold; color:#0d6efd; display:flex; justify-content:space-between;">
    <span>Soal ${indexLabel} (${q.tipe})</span><span class="badge bg-secondary">KD: ${q.kd || '-'}</span></div>
    <div class="teks-soal">${q.soal}</div>`;
    
    if (q.tipe === 'PGS' || q.tipe === 'MCMA') {
        h += `<div class="opsi-group">`;
        q.opsi.forEach((opt, i) => {
            if(opt) {
                const k = String.fromCharCode(65+i); const typeInput = q.tipe === 'PGS' ? 'radio' : 'checkbox';
                h += `<label class="opsi-item"><input type="${typeInput}" disabled> <div style="display:flex; width:100%;"><b style="margin-right:10px; margin-top:2px;">${k}.</b> <div class="opsi-content">${parseImgTags(opt)}</div></div></label>`;
            }
        });
        h += `</div>`;
    } else if (q.tipe === 'BENAR SALAH') {
        h += `<div class="opsi-group">`;
        q.opsi.forEach((opt, i) => {
            if(opt) {
                h += `<div style="display:flex; justify-content:space-between; padding:10px; border:1px solid #eee; align-items:center;">
                <div class="opsi-content">${parseImgTags(opt)}</div>
                <div style="min-width: 120px; text-align:right;"><button class="btn btn-outline-success btn-sm" disabled>Benar</button><button class="btn btn-outline-danger btn-sm" disabled>Salah</button></div></div>`;
            }
        });
        h += `</div>`;
    } else if (q.tipe === 'JODOHKAN') {
        h += `<div class="jodoh-container" id="jodohArea_${q.id}" style="background:#fafafa;"><svg class="jodoh-svg" id="svg_${q.id}"></svg><div class="jodoh-col" id="colLeft_${q.id}"></div><div class="jodoh-col" id="colRight_${q.id}"></div></div><div class="text-center text-muted small mt-2">(Mode Preview: Bisa diklik untuk tes garis)</div>`;
    } else if (q.tipe === 'URAIAN' || q.tipe === 'JAWABAN SINGKAT' || q.tipe === 'ISIAN SINGKAT') {
        h += `<textarea class="form-control" rows="3" placeholder="Area jawaban siswa..." disabled></textarea>`;
    } else if (q.tipe === 'UPLOAD') {
        h += `<div style="border:2px dashed #ccc; padding:20px; text-align:center; background:#f9f9f9; border-radius:8px;"><i class="fas fa-cloud-upload-alt fa-2x text-muted"></i><br>Area Upload File</div>`;
    }
    h += `</div>`;
    return h;
}

function previewSoal(idx) {
    const data = globalSoalData[idx];
    const html = generateSoalHTML(data, `No. ${data[0]}`);
    document.getElementById('previewContainer').innerHTML = html;
    new bootstrap.Modal(document.getElementById('modalPreview')).show();
    if (data[1] === 'JODOHKAN') {
        let kunciIdx = globalSoalHeaders.findIndex(h => String(h).toLowerCase().includes('kunci')); if(kunciIdx === -1) kunciIdx = 8;
        let opsiArr = []; for(let i = 4; i < kunciIdx; i++) opsiArr.push(data[i]);
        setTimeout(() => initJodohkanPreview({ id: data[0], opsi: opsiArr }), 200);
    }
}

function previewFullSheet() {
    if(!globalSoalData || globalSoalData.length === 0) return Swal.fire('Info', 'Belum ada data soal.', 'info');
    let fullHtml = '';
    globalSoalData.forEach((data, index) => { fullHtml += generateSoalHTML(data, `No. ${index+1}`); });
    document.getElementById('fullPreviewBody').innerHTML = fullHtml;
    new bootstrap.Modal(document.getElementById('modalFullPreview')).show();
    setTimeout(() => {
        globalSoalData.forEach(data => {
            if (data[1] === 'JODOHKAN') {
                let kunciIdx = globalSoalHeaders.findIndex(h => String(h).toLowerCase().includes('kunci')); if(kunciIdx === -1) kunciIdx = 8;
                let opsiArr = []; for(let i = 4; i < kunciIdx; i++) opsiArr.push(data[i]);
                initJodohkanPreview({ id: data[0], opsi: opsiArr });
            }
        });
    }, 300);
}

function initJodohkanPreview(q) {
    const colLeft = document.getElementById(`colLeft_${q.id}`); const colRight = document.getElementById(`colRight_${q.id}`);
    if(!colLeft || !colRight) return;
    let leftItems = [], rightItems = [];
    q.opsi.forEach((opt, i) => {
        if(!opt) return;
        let cleanOpt = opt.replace(/<p[^>]*>/gi, '').replace(/<\/p>/gi, '');
        const parts = cleanOpt.split('||'); const id = String.fromCharCode(65+i);
        if(parts[0] && parts[0].trim() !== '') leftItems.push({ id: id, text: parts[0].trim() });
        if(parts.length > 1 && parts[1] && parts[1].trim() !== '') rightItems.push({ id: id, text: parts[1].trim() });
    });
    colLeft.innerHTML = leftItems.map(item => `<div class="jodoh-item" id="L_${q.id}_${item.id}" onclick="clickJodohPrev('${q.id}', '${item.id}', 'L')"><div class="opsi-content">${item.text}</div><div class="jodoh-dot"></div></div>`).join('');
    colRight.innerHTML = rightItems.map(item => `<div class="jodoh-item" id="R_${q.id}_${item.id}" onclick="clickJodohPrev('${q.id}', '${item.id}', 'R')"><div class="jodoh-dot"></div><div class="opsi-content">${item.text}</div></div>`).join('');
}

function clickJodohPrev(qId, itemId, side) {
    if (side === 'L') {
        selectedLeftId = itemId;
        const container = document.getElementById(`jodohArea_${qId}`);
        if(container) {
            container.querySelectorAll('.jodoh-item').forEach(e => e.classList.remove('selected'));
            const el = document.getElementById(`L_${qId}_${itemId}`); if(el) el.classList.add('selected');
        }
    } else {
        if (selectedLeftId) {
            const elL = document.getElementById(`L_${qId}_${selectedLeftId}`);
            if(elL) {
                const elR = document.getElementById(`R_${qId}_${itemId}`); const container = document.getElementById(`jodohArea_${qId}`); const svg = document.getElementById(`svg_${qId}`);
                if(elL && elR && container && svg) {
                    const cRect = container.getBoundingClientRect(); const rL = elL.getBoundingClientRect(); const rR = elR.getBoundingClientRect();
                    const x1 = rL.right - cRect.left - 6; const y1 = rL.top + rL.height/2 - cRect.top;
                    const x2 = rR.left - cRect.left + 6; const y2 = rR.top + rR.height/2 - cRect.top;
                    svg.innerHTML += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" style="stroke:#0d6efd;stroke-width:3" />`;
                    elL.classList.remove('selected'); elL.classList.add('matched'); elR.classList.add('matched'); selectedLeftId = null;
                }
            }
        }
    }
}

function resetHasil(nisn, kode) { Swal.fire({title:'Reset?', text:'Data akan dihapus.', showCancelButton:true}).then(r=>{ if(r.isConfirmed) fetchAPI('deleteHasil', {nisn: nisn, kode: kode}).then(()=>{ loadPage('hasil'); }); }); }
function resetCache() { fetchAPI('resetCache').then(()=>{ Swal.fire('Sukses','Cache bersih','success') }); }

let currentKoreksiData = null, currentNisn = '', currentKode = '';
function koreksiHasil(nisn, kode) {
    currentNisn = nisn; currentKode = kode;
    Swal.fire({title:'Memuat Jawaban...', didOpen:()=>Swal.showLoading()});
    fetchAPI('getJawabanDetail', { nisn: nisn, kodeUjian: kode }).then(res => {
        Swal.close();
        if(res.status !== 'ok') return Swal.fire('Error', res.message, 'error');
        currentKoreksiData = res;
        document.getElementById('k_nama').innerText = res.nama; document.getElementById('k_skor_lama').innerText = res.skorLama;
        renderKoreksiForm(res.data); hitungTotalNilai();
        new bootstrap.Modal(document.getElementById('modalKoreksi')).show();
    });
}

function renderKoreksiForm(detailList) {
    const container = document.getElementById('koreksiContainer');
    let html = '';
    detailList.forEach((item, index) => {
        const isEssay = (item.tipe === 'URAIAN' || item.tipe === 'UPLOAD' || item.tipe.includes('URAIAN'));
        html += `<div class="review-item"><div class="review-q">Soal No. ${index+1} (${item.tipe})</div><div class="mb-2 text-muted small">${item.soal}</div>`;
        let jwb = String(item.jawaban || ''); let displayHtml = '';
        if (jwb.includes('[GAMBAR]')) {
            const url = jwb.replace('[GAMBAR]', '').trim();
            displayHtml = `<div class="mb-2"><img src="${url}" class="review-img" alt="Jawaban Siswa" style="max-height:200px"></div><a href="${url}" target="_blank" class="btn btn-sm btn-outline-primary">Buka Gambar Asli</a>`;
        } else if (jwb.match(/^https?:\/\//)) {
            displayHtml = `<a href="${jwb}" target="_blank" class="text-break">${jwb}</a> <span class="badge bg-secondary">Link</span>`;
        } else { displayHtml = `<div class="text-break">${jwb}</div>`; }
        html += `<div class="review-ans">${displayHtml}</div>`;
        if (isEssay) { html += `<div class="mt-2 d-flex align-items-center"><label class="me-2 fw-bold">Nilai:</label><input type="number" class="form-control score-input" value="0" min="0" onchange="hitungTotalNilai()"></div>`; } 
        else { html += `<div class="mt-2 text-success small"><i class="fas fa-check-circle"></i> Dinilai Otomatis</div>`; }
        html += `</div>`;
    });
    container.innerHTML = html;
}

function hitungTotalNilai() {
    const skorObjektif = parseFloat(document.getElementById('k_skor_lama').innerText) || 0;
    let totalEssay = 0;
    document.querySelectorAll('.score-input').forEach(inp => { totalEssay += parseFloat(inp.value) || 0; });
    document.getElementById('k_total_nilai').innerText = skorObjektif + totalEssay;
}

function simpanNilaiBaru() {
    const nilaiAkhir = document.getElementById('k_total_nilai').innerText;
    Swal.fire({ title: 'Simpan Nilai?', text: `Nilai Akhir: ${nilaiAkhir}`, icon: 'question', showCancelButton: true, confirmButtonText: 'Simpan' }).then((result) => {
        if (result.isConfirmed) {
            Swal.fire({title:'Menyimpan...', didOpen:()=>Swal.showLoading()});
            fetchAPI('saveNilaiRevisi', { nisn: currentNisn, kodeUjian: currentKode, nilaiBaru: nilaiAkhir }).then(res => {
                if(res.status === 'ok') { Swal.fire('Sukses', res.message, 'success'); bootstrap.Modal.getInstance(document.getElementById('modalKoreksi')).hide(); loadPage('hasil'); } 
                else { Swal.fire('Gagal', res.message, 'error'); }
            });
        }
    });
}
</script>
